- name: fails when not initialized
  code: |-
    const mockData = {
      method: 'clickedObjectIDs',
      eventName: 'click',
      index: 'my-index',
      objectIDs: 'obj1'
    };

    mock('copyFromWindow', function(key) {
      if (key === 'AlgoliaAnalyticsObject') return undefined;
      return undefined;
    });

    runCode(mockData);

    assertApi('gtmOnFailure').wasCalled();
