      index: 'my-index',
      objectIDs: ['foo,bar','ba\\z', 'with,multiple,commas'],
      userToken: 'my-user-token',
      authenticatedUserToken: 'my-authenticated-user-token'
    }]);
- name: clickedObjectIDsAfterSearch includes queryID and positions
