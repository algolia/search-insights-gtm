      queryID: 'my-query-id',
      objectIDs: 'obj1,obj2',
      positions: '1,3',
      userToken: 'my-user-token',
      authenticatedUserToken: 'my-authenticated-user-token'
    };

    runCode(mockData);

    const aa = copyFromWindow('aa');

    assertThat(aa.queue[aa.queue.length-1]).isEqualTo(['clickedObjectIDsAfterSearch', {
      eventName: 'click',
      index: 'my-index',
      queryID: 'my-query-id',
      objectIDs: ['obj1','obj2'],
      positions: [1, 3],
      userToken: 'my-user-token',
      authenticatedUserToken: 'my-authenticated-user-token'
    }]);
